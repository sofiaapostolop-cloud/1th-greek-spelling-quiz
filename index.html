<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Κουίζ Ορθογραφίας</title>
<style>
:root {
  --primary:#4f46e5;
  --primary2:#7c3aed;
  --bg:#f4f6fb;
  --card:#ffffff;
  --text:#1f2937;
  --muted:#64748b;
  --border:#dbe3ef;
  --ok:#15803d;
  --bad:#b91c1c;
}
* { box-sizing:border-box; }
body {
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:linear-gradient(135deg,#eef2ff,#f8fafc);
  color:var(--text);
}
.container {
  width:min(1000px,94%);
  margin:28px auto 60px;
}
header {
  background:linear-gradient(135deg,var(--primary),var(--primary2));
  color:white;
  padding:28px;
  border-radius:20px;
  box-shadow:0 14px 35px rgba(79,70,229,.22);
}
header h1 { margin:0; }
.quiz-list {
  display:grid;
  gap:18px;
  margin-top:22px;
}
.question-card {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:22px;
  box-shadow:0 8px 24px rgba(15,23,42,.07);
}
.question-title {
  font-size:1.08rem;
  line-height:1.5;
  font-weight:700;
  margin-bottom:14px;
}
.options {
  display:grid;
  gap:10px;
}
.option-label {
  display:flex;
  align-items:flex-start;
  gap:10px;
  padding:12px 14px;
  border:1px solid var(--border);
  border-radius:11px;
  cursor:pointer;
  line-height:1.45;
  background:#fff;
}
.option-label:hover {
  border-color:var(--primary);
  background:#f8f7ff;
}
.option-label.correct {
  border-color:#22c55e;
  background:#ecfdf3;
}
.option-label.wrong {
  border-color:#ef4444;
  background:#fef2f2;
}
.feedback {
  display:none;
  margin-top:13px;
  padding:12px 14px;
  border-radius:10px;
  line-height:1.45;
}
.feedback.ok {
  display:block;
  background:#ecfdf3;
  color:var(--ok);
  border:1px solid #bbf7d0;
}
.feedback.bad {
  display:block;
  background:#fef2f2;
  color:var(--bad);
  border:1px solid #fecaca;
}
.submit-wrap {
  position:sticky;
  bottom:12px;
  margin-top:24px;
  text-align:center;
}
.submit-btn {
  border:none;
  border-radius:12px;
  padding:14px 24px;
  font-size:1rem;
  font-weight:700;
  color:white;
  background:linear-gradient(135deg,var(--primary),var(--primary2));
  cursor:pointer;
  box-shadow:0 8px 22px rgba(79,70,229,.25);
}
.result {
  display:none;
  margin-top:22px;
  background:white;
  padding:24px;
  border-radius:16px;
  text-align:center;
  box-shadow:0 8px 24px rgba(15,23,42,.08);
}
.score {
  font-size:2.4rem;
  font-weight:800;
  color:var(--primary);
}
@media(max-width:600px) {
  .question-card { padding:17px; }
}
</style>
</head>
<body>
<div class="container">
  <header><h1>Κουίζ Ορθογραφίας</h1></header>
  <div class="quiz-list" id="quizList"></div>
  <div class="submit-wrap">
    <button class="submit-btn" id="submitBtn">Υποβολή απαντήσεων</button>
  </div>
  <section class="result" id="result">
    <h2>Αποτελέσματα</h2>
    <div class="score" id="score"></div>
  </section>
</div>

const greekLetters = ['Α','Β','Γ','Δ'];
const quizList = document.getElementById('quizList');
const answered = Array(questions.length).fill(null);

questions.forEach((q, qi) => {
  const card = document.createElement('section');
  card.className = 'question-card';
  card.innerHTML = `
    <div class="question-title">${qi + 1}. ${q.q}</div>
    <div class="options" id="options-${qi}"></div>
    <div class="feedback" id="feedback-${qi}"></div>
  `;
  quizList.appendChild(card);

  const optionsBox = document.getElementById(`options-${qi}`);
  q.options.forEach((opt, oi) => {
    const label = document.createElement('label');
    label.className = 'option-label';
    label.innerHTML = `
      <input type="radio" name="q${qi}" value="${oi}">
      <span><strong>${greekLetters[oi]}.</strong> ${opt}</span>
    `;
    optionsBox.appendChild(label);

    const input = label.querySelector('input');
    input.addEventListener('change', () => showImmediateFeedback(qi, oi));
  });
});

function showImmediateFeedback(qi, selectedIndex) {
  if (answered[qi] !== null) return;
  answered[qi] = selectedIndex;

  const q = questions[qi];
  const labels = [...document.querySelectorAll(`#options-${qi} .option-label`)];
  const inputs = [...document.querySelectorAll(`input[name="q${qi}"]`)];
  const feedback = document.getElementById(`feedback-${qi}`);

  inputs.forEach(input => input.disabled = true);
  labels[q.answer].classList.add('correct');

  if (selectedIndex === q.answer) {
    feedback.className = 'feedback ok';
    feedback.innerHTML = `<strong>Σωστά.</strong> ${q.feedback}`;
  } else {
    labels[selectedIndex].classList.add('wrong');
    feedback.className = 'feedback bad';
    feedback.innerHTML = `<strong>Λάθος.</strong> Η σωστή απάντηση είναι <strong>${greekLetters[q.answer]}. ${q.options[q.answer]}</strong>.<br>${q.feedback}`;
  }
}

document.getElementById('submitBtn').addEventListener('click', () => {
  const score = answered.reduce((sum, answer, index) => sum + (answer === questions[index].answer ? 1 : 0), 0);
  const unanswered = answered.filter(answer => answer === null).length;
  const percent = Math.round(score / questions.length * 100);

  document.getElementById('score').innerHTML =
    `${score} / ${questions.length} (${percent}%)` +
    (unanswered ? `<div style="font-size:1rem;color:#64748b;margin-top:8px;">Αναπάντητες: ${unanswered}</div>` : '');

  const result = document.getElementById('result');
  result.style.display = 'block';
  result.scrollIntoView({behavior:'smooth'});
});
</script>
</body>
</html>
